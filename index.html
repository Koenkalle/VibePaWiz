<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>VibePaWiz — Explorative Visualization of Scientific Citation Networks</title>
  </head>
  <body>
    <div id="app">
      <header class="app-header">
        <h1>VibePaWiz</h1>
        <p class="subtitle">Explorative visualization of scientific citation networks</p>
      </header>

      <section class="controls">
        <div class="control-row">
          <label for="provider">Source</label>
          <select id="provider" class="grow"></select>
        </div>

        <div class="control-row">
          <label for="author">Author</label>
          <input id="author" class="grow" placeholder="e.g. Kasper Green Larsen" autocomplete="off" />
          <button id="searchButton" class="btn btn-info">Search</button>
        </div>

        <div class="control-row">
          <label for="authorMatch">Match</label>
          <select id="authorMatch" class="grow"></select>
        </div>

        <div class="control-row">
          <label for="paper">Paper</label>
          <select id="paper" class="grow"></select>
          <button id="expandButton" class="btn btn-primary">Build graph</button>
        </div>

        <div class="control-row">
          <label for="layers">Layers</label>
          <input type="range" id="layers" min="1" max="5" value="2" class="grow" />
          <span id="layersShow" class="pill">2</span>

          <label for="direction">Direction</label>
          <select id="direction">
            <option value="citers" selected>Citers (incoming)</option>
            <option value="references">References (outgoing)</option>
            <option value="both">Both</option>
          </select>
        </div>

        <div class="control-row">
          <span id="progress" class="muted">idle</span>
          <span class="grow"></span>
          <button id="stopButton" class="btn btn-danger" disabled>Stop</button>
        </div>
      </section>

      <section class="stage">
        <div id="cy"></div>
        <aside class="sidebar">
          <h3>Chains</h3>
          <div id="cliqueList" class="clique-list"></div>
        </aside>
      </section>

      <section class="panel">
        <div class="panel-col">
          <h3>Display</h3>
          <label class="inline"><input type="checkbox" id="colors" checked /> Color chains</label>
          <label class="inline">
            Layout
            <select id="layout">
              <option value="dagre" selected>Hierarchical (L→R)</option>
              <option value="fcose">Force-directed</option>
            </select>
          </label>
          <label class="inline">
            Collapse chains
            <input type="range" id="collapse" min="0" max="20" value="0" />
            <span id="collapseShow" class="pill">0</span>
          </label>
        </div>

        <div class="panel-col">
          <h3>History</h3>
          <div id="history" class="history"></div>
        </div>

        <div class="panel-col">
          <h3>Import / Export</h3>
          <div class="btn-group">
            <button id="exportButton" class="btn">Export JSON</button>
            <button id="importButton" class="btn">Import JSON</button>
            <button id="shareButton" class="btn">Copy share link</button>
            <button id="clearCacheButton" class="btn btn-ghost">Clear cache</button>
          </div>
          <textarea id="dataInput" rows="3" placeholder="Paste exported JSON here, then click Import"></textarea>
        </div>
      </section>

      <footer class="app-footer">
        <span id="statusBar" class="muted"></span>
      </footer>
    </div>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
